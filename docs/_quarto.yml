project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "backends/*.qmd"
    - "estimation/*.qmd"

website:
  title: "RieszReg"
  description: "Riesz regression for semiparametric inference — user guide."
  favicon: logo.svg
  search: true
  page-navigation: true
  navbar:
    logo: logo.svg
    title: false
    right:
      - icon: github
        href: https://github.com/rieszreg/rieszreg
        aria-label: GitHub
  sidebar:
    style: floating
    contents:
      - index.qmd
      - intro.qmd
      - install.qmd
      - section: "Usage"
        contents:
          - losses.qmd
          - estimands.qmd
          - tuning-and-cross-fitting.qmd
          - diagnostics.qmd
          - save-and-load.qmd
          - r-interface.qmd
      - section: "Backends"
        contents:
          - backends/index.qmd
          - backends/boosting.qmd
          - backends/kernel.qmd
          - backends/forest.qmd
          - backends/tree.qmd
          - backends/neural.qmd
      - section: "Estimation"
        contents:
          - estimation/index.qmd
          - estimation/custom.qmd
          - estimation/external.qmd
      - troubleshooting.qmd
      - related.qmd
      - references.qmd

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: styles.css
    code-copy: true
    code-overflow: wrap
    code-link: true
    toc: true
    toc-depth: 3
    fig-width: 7
    fig-height: 4.5

# knitr is the default — it executes both {r} chunks natively and {python}
# chunks via reticulate. Each .qmd that has executable code starts with a
# hidden setup chunk that points reticulate at a venv with rieszreg,
# rieszboost, and krrr installed and dev-loads the R wrappers.
execute:
  freeze: auto
  echo: true
  warning: false
