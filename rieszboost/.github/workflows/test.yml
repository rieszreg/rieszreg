name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Checkout rieszreg (sibling repo)
        uses: actions/checkout@v4
        with:
          repository: rieszreg/rieszreg
          path: _rieszreg

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install OS prerequisites (macOS only — xgboost needs libomp)
        if: matrix.os == 'macos-latest'
        run: brew install libomp

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e _rieszreg/rieszreg/python
          pip install -e python/[test]
          pip install pandas hypothesis

      - name: pytest
        run: pytest python/tests -q

  r-parity:
    runs-on: ubuntu-latest
    needs: pytest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout rieszreg (sibling repo)
        uses: actions/checkout@v4
        with:
          repository: rieszreg/rieszreg
          path: _rieszreg

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -e _rieszreg/rieszreg/python
          pip install -e python/
          pip install pandas

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::reticulate
            any::R6
            any::pkgload
            any::testthat
          # No working-directory: pak only installs the explicit list above.
          # If we pointed at r/rieszboost, pak would read DESCRIPTION and try
          # to resolve `Imports: rieszreg` via CRAN — rieszreg isn't on CRAN;
          # the test step dev-loads it from the sibling _rieszreg checkout.

      - name: Point reticulate at the project Python
        run: echo "RETICULATE_PYTHON=$(python -c 'import sys; print(sys.executable)')" >> $GITHUB_ENV

      - name: R parity tests
        run: |
          Rscript -e '
            pkgload::load_all("_rieszreg/rieszreg/r/rieszreg", quiet=TRUE)
            pkgload::load_all("r/rieszboost", quiet=TRUE)
            # stop_on_failure=TRUE makes test_dir throw on any test failure;
            # a stopifnot wrapper would always fail because test_dir returns
            # a testthat_results list (not literal TRUE) on success.
            testthat::test_dir(
              "r/rieszboost/tests/testthat",
              reporter = "summary",
              stop_on_failure = TRUE
            )
          '
