name: Render and deploy unified docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'packages/**'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'packages/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: write   # required to push to gh-pages

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync workspace + docs deps (one venv covers all six packages)
        run: uv sync --all-packages --all-extras --group docs

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::knitr
            any::rmarkdown
            any::reticulate
            any::R6
            any::pkgload
            any::xgboost
            any::rsample
          working-directory: packages/rieszreg/r/rieszreg

      - name: Point reticulate at the workspace venv
        run: echo "RETICULATE_PYTHON=$(uv run python -c 'import sys; print(sys.executable)')" >> $GITHUB_ENV

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Render
        uses: quarto-dev/quarto-actions/render@v2
        with:
          path: docs

      - name: Publish to gh-pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          path: docs
          render: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
