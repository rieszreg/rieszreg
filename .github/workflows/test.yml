name: Test (Python + R)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ['3.11', '3.12']
        package: [rieszreg, rieszboost, krrr, forestriesz, riesznet, riesztree]

    steps:
      - uses: actions/checkout@v4

      - name: Install libomp (macOS — xgboost runtime needs it)
        if: matrix.os == 'macos-latest'
        run: brew install libomp

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync workspace
        run: uv sync --all-packages --all-extras --python ${{ matrix.python }}

      - name: pytest packages/${{ matrix.package }}/python/tests
        run: uv run pytest packages/${{ matrix.package }}/python/tests -q

  rtests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [rieszboost, krrr, forestriesz, riesznet, riesztree]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync workspace (R parity tests reticulate into the workspace venv)
        run: uv sync --all-packages --all-extras

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      # rieszreg's R DESCRIPTION only declares CRAN deps (R6, reticulate,
      # testthat, pkgload); pak can resolve those. The sibling packages'
      # DESCRIPTIONs declare 'rieszreg' as an Import, which pak can't
      # resolve from CRAN — so we point setup-r-dependencies at rieszreg's
      # DESCRIPTION (working-directory) for installing system deps via pak,
      # and rely on pkgload::load_all to bring in the workspace-local
      # rieszreg + sibling packages at test time.
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: packages/rieszreg/r/rieszreg
          extra-packages: |
            any::xgboost
            any::rsample

      - name: Run R parity tests
        run: |
          export RETICULATE_PYTHON=$(uv run python -c 'import sys; print(sys.executable)')
          Rscript -e '
            pkgload::load_all("packages/rieszreg/r/rieszreg")
            pkg <- "${{ matrix.package }}"
            pkgload::load_all(file.path("packages", pkg, "r", pkg))
            test_dir <- file.path("packages", pkg, "r", pkg, "tests", "testthat")
            if (dir.exists(test_dir)) {
              testthat::test_dir(test_dir)
            } else {
              cat("(no testthat dir for", pkg, ")\n")
            }
          '
